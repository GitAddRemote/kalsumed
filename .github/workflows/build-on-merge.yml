# .github/workflows/build-on-merge.yml

name: Build on Merge to Main or Feature Branches

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - 'feature/**'
      - 'enhancement/**'
      - 'fix/**'

jobs:
